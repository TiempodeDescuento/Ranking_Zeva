<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking de Asesores | Hanak</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e8e8e8;
            --surface: #f5f5f5;
            --white: #ffffff;
            --dark: #1a1a2e;
            --text: #2d2d2d;
            --text-muted: #888;
            --gold: #c9a227;
            --gold-light: #f0d060;
            --teal: #26b8b0;
            --bronze: #a0522d;
            --green: #22c55e;
            --red: #ef4444;
            --rank1-border: #1a1a1a;
            --rank2-border: #26b8b0;
            --rank3-border: #a0522d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        /* WATERMARK BACKGROUND */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: repeating-linear-gradient(
                -45deg,
                transparent,
                transparent 60px,
                rgba(0,0,0,0.018) 60px,
                rgba(0,0,0,0.018) 61px
            );
            pointer-events: none;
            z-index: 0;
        }

        .page {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 1;
        }

        /* ─── HEADER ─── */
        .header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: var(--white);
            border-radius: 16px;
            padding: 16px 28px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .trophy-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            box-shadow: 0 4px 12px rgba(201,162,39,0.35);
        }

        .header-title h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--dark);
            line-height: 1.1;
        }

        .header-title span {
            font-size: 0.85rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .calendar-icon { font-size: 22px; }

        .header-date {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .header-right .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .header-right .goal-amount {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--dark);
        }

        /* ─── PODIUM ─── */
        .podium {
            display: grid;
            grid-template-columns: 1fr 1.12fr 1fr;
            gap: 14px;
            align-items: stretch;
        }

        .podium-card {
            background: var(--white);
            border-radius: 18px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            
            /* --- NUEVOS CAMBIOS PARA ALTURA ESCALONADA --- */
            min-height: 280px; /* Altura base para el puesto 3 */
            justify-content: flex-end; /* Alinea el contenido abajo para que crezcan hacia arriba */
        }

        .podium-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.13);
        }

        .rank-1 {
            border: 2.5px solid var(--rank1-border);
            background: linear-gradient(160deg, #1c1c2e 0%, #2d2d45 100%);
            color: var(--white);
            /* --- NUEVO: Más alto --- */
            flex-grow: 1.15;
        }

        /* --- NUEVO PUESTO 2: Altura media --- */
        .rank-2 { 
            border: 2.5px solid var(--rank2-border); 
            /* Asegúrate de que no haya min-height aquí */
        }

        .rank-3 { 
            border: 2.5px solid var(--rank3-border); 
            /* Asegúrate de que no haya min-height aquí */
        }

        .place-badge {
            position: absolute;
            top: -12px; left: 16px;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .rank-1 .place-badge {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: #1a1a1a;
        }

        .rank-2 .place-badge { background: var(--teal); color: white; }
        .rank-3 .place-badge { background: var(--bronze); color: white; }

        .place-number { display: block; font-size: 1.05rem; font-weight: 900; }
        .place-label { font-size: 0.6rem; font-weight: 600; opacity: 0.85; }

        .crown { text-align: center; font-size: 1.5rem; line-height: 1; }

        .advisor-photo {
            width: 75px; height: 75px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto;
            display: block;
        }

        .rank-1 .advisor-photo {
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px rgba(201,162,39,0.4);
            /* --- NUEVO: Foto más grande --- */
            width: 100px; height: 100px;
        }

        /* --- NUEVO: Foto mediana para Puesto 2 --- */
        .rank-2 .advisor-photo {
            border: 3px solid var(--teal);
            width: 85px; height: 85px;
        }

        .advisor-name {
            text-align: center;
            font-size: 1rem;
            font-weight: 800;
            line-height: 1.2;
        }

        .rank-1 .advisor-name { font-size: 1.1rem; color: var(--white); }

        .metrics { display: flex; flex-direction: column; gap: 6px; }
        .metric-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; }
        .metric-label { color: var(--text-muted); font-weight: 500; }
        .rank-1 .metric-label { color: rgba(255,255,255,0.55); }
        .metric-value { font-weight: 700; color: var(--dark); }
        .rank-1 .metric-value { color: var(--white); }
        .metric-value.highlight { color: var(--green); }
        .rank-1 .metric-value.highlight { color: var(--gold-light); }

        .effectivity-bar-wrapper { margin-top: 4px; }
        .effectivity-label-row { display: flex; justify-content: space-between; font-size: 0.72rem; margin-bottom: 4px; }
        .effectivity-label { font-weight: 600; color: var(--text-muted); }
        .rank-1 .effectivity-label { color: rgba(255,255,255,0.55); }
        .effectivity-pct { font-weight: 700; }

        .bar-track { height: 7px; background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; }
        .rank-1 .bar-track { background: rgba(255,255,255,0.15); }
        .bar-fill { height: 100%; border-radius: 10px; background: var(--green); transition: width 1s cubic-bezier(0.23, 1, 0.32, 1); }
        .bar-fill.zero { background: var(--red); width: 4px !important; }

        /* ─── TABLE ─── */
        .ranking-table {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }

        .table-header {
            display: grid;
            grid-template-columns: 100px 1fr 140px 130px 1fr;
            padding: 12px 24px;
            background: var(--dark);
            color: white;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .table-header span:not(:first-child) { text-align: center; }

        .table-row {
            display: grid;
            grid-template-columns: 100px 1fr 140px 130px 1fr;
            padding: 14px 24px;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            transition: background 0.2s;
        }

        .table-row:last-child { border-bottom: none; }
        .table-row:hover { background: rgba(0,0,0,0.02); }

        .table-pos { font-size: 1.1rem; font-weight: 800; color: var(--dark); }
        .table-advisor { display: flex; align-items: center; gap: 12px; }
        .table-advisor img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 2px solid var(--bg); }
        .table-advisor-name { font-weight: 600; font-size: 0.9rem; }
        .table-cell { text-align: center; font-weight: 700; font-size: 0.9rem; color: var(--dark); }

        .table-effectivity { display: flex; align-items: center; gap: 10px; padding-right: 8px; }
        .table-bar-track { flex: 1; height: 6px; background: rgba(0,0,0,0.08); border-radius: 10px; overflow: hidden; }
        .table-bar-fill { height: 100%; border-radius: 10px; background: var(--green); }
        .table-bar-fill.zero { background: var(--red); width: 4px !important; }
        .table-pct { font-size: 0.78rem; font-weight: 700; min-width: 30px; text-align: right; }
        .table-pct.zero { color: var(--red); }

        /* ─── FOOTER ─── */
        .footer {
            background: var(--white);
            border-radius: 14px;
            padding: 14px 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            font-size: 0.95rem;
        }

        .footer-icon { font-size: 1.4rem; }
        .footer-label { color: var(--text-muted); font-weight: 500; }
        .footer-progress { font-weight: 700; color: var(--dark); }
        .footer-pct { font-size: 1.4rem; font-weight: 900; color: var(--green); }

        /* Entrance animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header { animation: fadeUp 0.5s ease both; }
        .podium { animation: fadeUp 0.5s 0.1s ease both; }
        .ranking-table { animation: fadeUp 0.5s 0.2s ease both; }
        .footer { animation: fadeUp 0.5s 0.3s ease both; }

        /* ─── OPTIMIZACIÓN PARA MÓVILES (RESPONSIVE) ─── */
        @media (max-width: 768px) {
            .page {
                padding: 15px;
                gap: 15px;
            }

            /* Header: De 3 columnas a 1 para que no se amontone */
            .header {
                grid-template-columns: 1fr;
                gap: 15px;
                text-align: center;
            }
            .header-left, .header-center, .header-right {
                justify-content: center;
                align-items: center;
                text-align: center;
            }

            /* Podio: De 3 columnas a 1 columna vertical */
            .podium {
                grid-template-columns: 1fr;
                display: flex;
                flex-direction: column;
            }

            /* Reordenar podio en móvil: 1ro arriba, luego 2do y 3ro */
            .rank-1 { order: 1; min-height: auto !important; flex-grow: 1 !important; }
            .rank-2 { order: 2; min-height: auto !important; }
            .rank-3 { order: 3; min-height: auto !important; }

            /* Tabla: Hacemos que se pueda deslizar hacia los lados si es muy ancha */
            .ranking-table {
                overflow-x: auto;
                display: block;
            }
            .table-header, .table-row {
                min-width: 600px; /* Evita que las columnas se colapsen */
            }

            /* Footer: Apilado vertical */
            .footer {
                flex-direction: column;
                text-align: center;
                gap: 8px;
            }
            
            .advisor-photo {
                width: 80px !important;
                height: 80px !important;
            }
        }
    </style>
</head>
<body>
<div class="page">

    <div class="header">
        <div class="header-left">
            <div class="trophy-icon">🏆</div>
            <div class="header-title">
                <h1>Ranking de asesores</h1>
                <span>Hanak</span>
            </div>
        </div>
        <div class="header-center">
            <div class="calendar-icon">📅</div>
            <div id="display-date" class="header-date">MAYO 2026</div>
        </div>
        <div class="header-right">
            <span class="label">Meta mensual individual</span>
            <span class="goal-amount">$ 20,000</span>
        </div>
    </div>

    <div class="podium" id="podium"></div>

    <div class="ranking-table" id="table-section"></div>

    <div class="footer">
        <span class="footer-icon">🎯</span>
        <span class="footer-label">Meta General:</span>
        <span class="footer-progress" id="footer-progress">$ 0 / $ 0</span>
        <span class="footer-pct" id="footer-pct">0%</span>
    </div>

</div>

<script>
    /** * CONFIGURACIÓN
     * 1. Reemplaza CSV_URL con tu enlace de Google Sheets (Publicado como CSV)
     * 2. RUTA_FOTOS_LOCALES es la carpeta donde están tus imágenes.
     */
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS7zR6hzp_Jt7pqCTKDVq_xYoM5B5TPrcg5qNtmGWhoTYSk-pt84MhdSy27Ikatv00W_2Vvv791MTOr/pub?output=csv'; 
    const RUTA_FOTOS_LOCALES = 'img/asesores/'; 
    const META_INDIVIDUAL = 20000;

    async function cargarDatos() {
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            
            // Procesamiento robusto del CSV
            const lines = text.split(/\r?\n/);
            const data = [];
            
            // Empezamos en i=1 para saltar la cabecera
            for(let i = 1; i < lines.length; i++) {
                if(!lines[i].trim()) continue;
                
                // Limpiamos comillas que Drive suele poner en los nombres
                const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g, '').trim());
                
                if(cols.length >= 4) {
                    const nombre = cols[0];
                    data.push({
                        nombre: nombre,
                        ingresos: parseFloat(cols[1]) || 0,
                        conversion: parseFloat(cols[2]) || 0,
                        efectividad: parseFloat(cols[3]) || 0,
                        // Generamos la ruta local de la foto
                        foto: RUTA_FOTOS_LOCALES + nombre + ".jpg"
                    });
                }
            }
            
            dibujarDashboard(data);
        } catch (error) {
            console.error("Error al obtener datos:", error);
        }
    }

    function fmt(n) {
        return '$' + n.toLocaleString('es-CO');
    }

    function dibujarDashboard(asesores) {
        // 1. Ordenar por ingresos descendente
        asesores.sort((a, b) => b.ingresos - a.ingresos);

        const top3 = asesores.slice(0, 3);
        const resto = asesores.slice(3);

        // --- RENDER PODIUM ---
        const podiumEl = document.getElementById('podium');
        const visualOrder = [top3[1] || null, top3[0] || null, top3[2] || null];
        const visualRanks = [2, 1, 3];
        const visualClasses = ['rank-2', 'rank-1', 'rank-3'];

        let podiumHTML = '';
        visualOrder.forEach((a, i) => {
            if(!a) {
                podiumHTML += `<div class="podium-card" style="visibility:hidden"></div>`;
                return;
            }
            const isFirst = visualRanks[i] === 1;
            const zero = a.efectividad === 0;

            podiumHTML += `
            <div class="podium-card ${visualClasses[i]}">
                <div class="place-badge">
                    <span class="place-number">${visualRanks[i]}</span>
                    <span class="place-label">Lugar</span>
                </div>
                ${isFirst ? '<div class="crown">👑</div>' : ''}
                <img src="${a.foto}" class="advisor-photo" onerror="this.src='https://via.placeholder.com/150'">
                <div class="advisor-name">${a.nombre}</div>
                <div class="metrics">
                    <div class="metric-row">
                        <span class="metric-label">Ingresos</span>
                        <span class="metric-value ${isFirst ? 'highlight' : ''}" style="${!isFirst ? 'color:var(--green)' : ''}">${fmt(a.ingresos)}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Tasa de conversión</span>
                        <span class="metric-value">${a.conversion.toFixed(2)}%</span>
                    </div>
                </div>
                <div class="effectivity-bar-wrapper">
                    <div class="effectivity-label-row">
                        <span class="effectivity-label">Efectividad</span>
                        <span class="effectivity-pct" style="color:${zero ? 'var(--red)' : (isFirst ? 'var(--gold-light)' : 'var(--green)')}">${a.efectividad}%</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill ${zero ? 'zero' : ''}" style="width:${a.efectividad}%"></div>
                    </div>
                </div>
            </div>`;
        });
        podiumEl.innerHTML = podiumHTML;

        // --- RENDER TABLE ---
        const tableSection = document.getElementById('table-section');
        if(resto.length === 0) {
            tableSection.style.display = 'none';
        } else {
            tableSection.style.display = 'block';
            let tableHTML = `
                <div class="table-header">
                    <span>Posición</span>
                    <span style="text-align:left">Asesor</span>
                    <span>Ingresos</span>
                    <span>Conversión</span>
                    <span>Efectividad</span>
                </div>`;
            
            resto.forEach((a, i) => {
                const zero = a.efectividad === 0;
                tableHTML += `
                <div class="table-row">
                    <span class="table-pos">${i + 4}</span>
                    <div class="table-advisor">
                        <img src="${a.foto}" onerror="this.src='https://via.placeholder.com/150'">
                        <span class="table-advisor-name">${a.nombre}</span>
                    </div>
                    <span class="table-cell">${fmt(a.ingresos)}</span>
                    <span class="table-cell">${a.conversion.toFixed(2)}%</span>
                    <div class="table-effectivity">
                        <div class="table-bar-track">
                            <div class="table-bar-fill ${zero ? 'zero' : ''}" style="width:${a.efectividad}%"></div>
                        </div>
                        <span class="table-pct ${zero ? 'zero' : ''}">${a.efectividad}%</span>
                    </div>
                </div>`;
            });
            tableSection.innerHTML = tableHTML;
        }

        // --- RENDER FOOTER ---
        const totalLogrado = asesores.reduce((sum, a) => sum + a.ingresos, 0);
        const metaGlobal = META_INDIVIDUAL * asesores.length;
        const porcentajeFinal = Math.round((totalLogrado / metaGlobal) * 100) || 0;
        
        document.getElementById('footer-progress').textContent = `${fmt(totalLogrado)} / ${fmt(metaGlobal)}`;
        document.getElementById('footer-pct').textContent = `${porcentajeFinal}%`;
    }

    // Inicio automático
    cargarDatos();
    // Actualizar cada 5 minutos
    setInterval(cargarDatos, 300000);
</script>
</body>
</html>
